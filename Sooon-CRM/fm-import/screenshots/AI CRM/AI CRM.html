<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'DM Sans',sans-serif;background:#F5F7FA;color:#111827;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#CBD5E1;border-radius:3px}
.mono{font-family:'DM Mono',monospace}
.tabnum{font-variant-numeric:tabular-nums;font-family:'DM Mono',monospace}
@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.fade-in{animation:fadeIn .18s ease both}
.skeleton{background:linear-gradient(90deg,#F1F5F9 25%,#E2E8F0 50%,#F1F5F9 75%);background-size:400px 100%;animation:shimmer 1.4s ease infinite;border-radius:4px}

/* SIDEBAR */
.nav-item{display:flex;align-items:center;gap:9px;padding:7px 12px;border-radius:6px;font-size:12.5px;font-weight:400;color:#94A3B8;cursor:pointer;transition:all .12s;user-select:none}
.nav-item:hover{background:rgba(255,255,255,.07);color:#CBD5E1}
.nav-item.active{background:rgba(13,148,136,.2);color:#2DD4BF;font-weight:500}
.nav-item.sub{padding-left:28px;font-size:12px}
.nav-divider{height:1px;background:#1E293B;margin:6px 0}
.badge{display:inline-flex;align-items:center;justify-content:center;font-size:9.5px;font-family:'DM Mono',monospace;font-weight:500;min-width:17px;height:17px;padding:0 4px;border-radius:8px;background:#0D9488;color:#fff}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;font-weight:500;cursor:pointer;transition:all .12s;border:1px solid transparent;user-select:none;white-space:nowrap}
.btn-ghost{background:#fff;border-color:#E2E8F0;color:#374151}
.btn-ghost:hover{background:#F9FAFB;border-color:#CBD5E1}
.btn-primary{background:#0D9488;color:#fff;border-color:#0D9488}
.btn-primary:hover{background:#0F766E}
.btn-sel{background:#EFF6FF;border-color:#BFDBFE;color:#1D4ED8}

/* TABS */
.tab-bar{display:flex;gap:0;border-bottom:1px solid #E5E7EB;background:#fff;padding:0 24px;flex-shrink:0}
.tab{padding:10px 16px;font-size:12.5px;font-weight:500;color:#9CA3AF;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.tab:hover{color:#374151}
.tab.on{color:#0D9488;border-bottom-color:#0D9488}

/* CARDS */
.card{background:#fff;border:1px solid #E5E7EB;border-radius:10px}
.card-header{padding:14px 20px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:600;color:#111827}
.card-sub{font-size:11.5px;color:#9CA3AF;margin-top:2px}

/* KPI */
.kpi{flex:1;padding:16px 20px;border-right:1px solid #E5E7EB}
.kpi:last-child{border-right:none}
.kpi-label{font-size:11px;color:#9CA3AF;font-weight:500;margin-bottom:7px}
.kpi-val{font-size:20px;font-weight:700;letter-spacing:-.5px;margin-bottom:5px;font-variant-numeric:tabular-nums;font-family:'DM Mono',monospace}
.kpi-chg{font-size:10.5px;font-family:'DM Mono',monospace;font-weight:500}

/* MAIN TABLE */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:10.5px;font-weight:600;color:#6B7280;padding:8px 12px;border-bottom:1px solid #E5E7EB;text-align:right;white-space:nowrap;background:#F9FAFB}
.tbl th.left{text-align:left}
.tbl td{font-size:12px;padding:9px 12px;border-bottom:1px solid #F1F5F9;text-align:right;white-space:nowrap}
.tbl td.left{text-align:left}
.tbl tr:hover td{background:#F9FAFB;cursor:pointer}
.tbl .sum td{font-weight:700;background:#F0FDF4;border-top:2px solid #D1FAE5}

/* AD DAILY TABLE (dense) */
.dtbl{width:100%;border-collapse:collapse;font-size:11px}
.dtbl th{background:#FEF3C7;color:#92400E;font-size:10px;font-weight:600;padding:5px 8px;border:1px solid #FDE68A;white-space:nowrap;text-align:right;position:sticky;top:0;z-index:2}
.dtbl th.left{text-align:left}
.dtbl td{padding:4px 8px;border:1px solid #E5E7EB;text-align:right;font-family:'DM Mono',monospace;font-size:10.5px}
.dtbl td.left{text-align:left;font-family:'DM Sans',sans-serif}
.dtbl tr:nth-child(even) td{background:#FAFAFA}
.dtbl tr:hover td{background:#FEF9C3 !important}
.dtbl .total td{background:#FEF3C7;font-weight:700;border-top:2px solid #F59E0B}

/* LIST SUMMARY TABLE */
.ltbl{width:100%;border-collapse:collapse;font-size:11px}
.ltbl th{background:#1E293B;color:#94A3B8;font-size:10px;font-weight:500;padding:6px 10px;border:1px solid #2D3748;white-space:nowrap;text-align:right;position:sticky;top:0;z-index:2}
.ltbl th.left{text-align:left;position:sticky;left:0;z-index:3;background:#0F172A}
.ltbl td{padding:5px 10px;border:1px solid #E5E7EB;text-align:right;font-family:'DM Mono',monospace;font-size:10.5px}
.ltbl td.left{text-align:left;font-family:'DM Sans',sans-serif;position:sticky;left:0;background:#fff;z-index:1;font-size:11px;font-weight:500}
.ltbl tr:nth-child(even) td{background:#F8FAFC}
.ltbl tr:nth-child(even) td.left{background:#F8FAFC}
.ltbl .sect td{background:#E0F2FE;font-weight:700;color:#0369A1;border-top:2px solid #BAE6FD}
.ltbl .sect td.left{background:#E0F2FE}
.ltbl .rate td{color:#0D9488;font-weight:500}
.ltbl .rate td.left{color:#0D9488}

/* BADGE */
.tag{display:inline-flex;align-items:center;padding:1px 7px;border-radius:4px;font-size:10px;font-weight:500}
.tag-green{background:#DCFCE7;color:#15803D}
.tag-red{background:#FEE2E2;color:#DC2626}
.tag-yellow{background:#FEF3C7;color:#92400E}
.tag-blue{background:#DBEAFE;color:#1D4ED8}
.tag-grey{background:#F3F4F6;color:#6B7280}
.tag-teal{background:#CCFBF1;color:#0D9488}

/* FileMaker */
.fm-field{display:flex;flex-direction:column;gap:3px}
.fm-label{font-size:10px;color:#6B7280;font-weight:500}
.fm-value{font-size:11.5px;color:#111827;background:#F9FAFB;border:1px solid #E5E7EB;border-radius:4px;padding:5px 9px;min-height:26px;font-family:'DM Mono',monospace}
.fm-sec{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:14px;margin-bottom:10px}

/* AI */
.ai-msg{padding:11px 15px;border-radius:10px;font-size:13px;line-height:1.7;max-width:540px;white-space:pre-wrap}
.ai-msg.a{background:#F0FDF4;border:1px solid #BBF7D0;color:#111827;align-self:flex-start}
.ai-msg.u{background:#0D9488;color:#fff;align-self:flex-end}
.ai-input{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:10px 14px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;resize:none;background:#fff}
.ai-input:focus{border-color:#0D9488;box-shadow:0 0 0 3px rgba(13,148,136,.08)}

/* PIPELINE */
.pipe-col{flex:1;min-width:160px}
.pipe-card{background:#fff;border:1px solid #E5E7EB;border-radius:8px;padding:12px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.pipe-card:hover{border-color:#0D9488;box-shadow:0 2px 8px rgba(13,148,136,.1)}

/* FUNNEL VISUAL */
.funnel-step{display:flex;flex-direction:column;align-items:center;gap:4px;flex:1}
</style>

function BarLineChart({data,xKey,barKey,lineKey,barLabel,lineLabel}){
  const W=560,H=150,P={t:12,r:12,b:28,l:52};
  const cw=W-P.l-P.r,ch=H-P.t-P.b;
  const maxB=Math.max(...data.map(d=>d[barKey]));
  const maxL=Math.max(...data.map(d=>d[lineKey]));
  const minL=Math.min(...data.map(d=>d[lineKey]));
  const bw=cw/data.length*0.6;
  const lpts=data.map((d,i)=>`${P.l+i*(cw/(data.length-1))},${P.t+ch-((d[lineKey]-minL)/(maxL-minL||1))*ch}`).join(" ");
  return<svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
    {[0,.5,1].map(f=><line key={f} x1={P.l} y1={P.t+ch*(1-f)} x2={W-P.r} y2={P.t+ch*(1-f)} stroke="#F1F5F9" strokeWidth="1"/>)}
    {data.map((d,i)=>{
      const x=P.l+i*(cw/data.length)+cw/data.length*0.2;
      const h=(d[barKey]/maxB)*ch;
      return<g key={i}>
        <rect x={x} y={P.t+ch-h} width={bw} height={h} fill="#BAE6FD" rx="2"/>
        <text x={x+bw/2} y={H-P.b+12} fontSize="8" fill="#9CA3AF" textAnchor="middle">{d[xKey]}</text>
      </g>;
    })}
    <polyline points={lpts} stroke="#0D9488" strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    {data.map((d,i)=><circle key={i} cx={P.l+i*(cw/(data.length-1))} cy={P.t+ch-((d[lineKey]-minL)/(maxL-minL||1))*ch} r="2.5" fill="#0D9488" stroke="#fff" strokeWidth="1.5"/>)}
    <rect x={P.l} y={8} width={8} height={5} fill="#BAE6FD" rx="1"/><text x={P.l+11} y={13} fontSize="8" fill="#6B7280">{barLabel}</text>
    <rect x={P.l+70} y={8} width={12} height={2} fill="#0D9488"/><text x={P.l+85} y={13} fontSize="8" fill="#6B7280">{lineLabel}</text>
  </svg>;
}

function LineChart({data,xKey,yKey,color,fmt}){
  const W=560,H=120,P={t:12,r:12,b:24,l:48};
  const cw=W-P.l-P.r,ch=H-P.t-P.b;
  const max=Math.max(...data.map(d=>d[yKey]));
  const min=Math.min(...data.map(d=>d[yKey]));
  const sx=i=>P.l+i*(cw/(data.length-1));
  const sy=v=>P.t+ch-((v-min)/(max-min||1))*ch;
  const pts=data.map((d,i)=>`${sx(i)},${sy(d[yKey])}`).join(" ");
  return<svg width="100%" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="xMidYMid meet">
    {[0,.5,1].map(f=>{const y=P.t+ch*(1-f);const v=min+(max-min)*f;return<g key={f}><line x1={P.l} y1={y} x2={W-P.r} y2={y} stroke="#F1F5F9" strokeWidth="1"/><text x={P.l-4} y={y+4} fontSize="8" fill="#9CA3AF" textAnchor="end">{fmt?fmt(v):v.toFixed(0)}</text></g>;})}
    <polyline points={pts} stroke={color} strokeWidth="2" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
    {data.map((d,i)=><circle key={i} cx={sx(i)} cy={sy(d[yKey])} r="2.5" fill={color} stroke="#fff" strokeWidth="1.5"/>)}
    {data.map((d,i)=><text key={i} x={sx(i)} y={H-P.b+12} fontSize="8" fill="#9CA3AF" textAnchor="middle">{d[xKey]}</text>)}
  </svg>;
}

function AdDailyTable({data,title}){
  const tot={leads:0,clicks:0,reach:0,imp:0,spend:0};
  data.forEach(r=>{tot.leads+=r.leads;tot.clicks+=r.clicks;tot.reach+=r.reach;tot.imp+=r.imp;tot.spend+=r.spend;});
  tot.cpa=tot.leads>0?Math.round(tot.spend/tot.leads):0;
  tot.ctr=tot.imp>0?tot.clicks/tot.imp*100:0;
  tot.cpc=tot.clicks>0?Math.round(tot.spend/tot.clicks):0;
  tot.cpm=tot.imp>0?Math.round(tot.spend/tot.imp*1000):0;
  return<div style={{background:"#fff",border:"1px solid #E5E7EB",borderRadius:10,overflow:"hidden",marginBottom:16}}>
    <div style={{background:"#FEF9C3",padding:"10px 16px",borderBottom:"1px solid #FDE68A",display:"flex",alignItems:"center",gap:12}}>
      <span style={{fontSize:13,fontWeight:600,color:"#92400E"}}>{title}</span>
    </div>
    <div style={{overflowX:"auto"}}>
      <table className="dtbl">
        <thead><tr>
          <th className="left" style={{minWidth:90}}>日付</th>
          <th style={{width:40}}>曜日</th>
          <th>リード</th><th>クリック</th><th>リーチ</th><th>インプ</th>
          <th>リークエンシ</th><th>CPA</th><th>CTR</th><th>CPC</th><th>CPM</th><th>広告費</th>
        </tr></thead>
        <tbody>
          <tr className="total">
            <td className="left" style={{fontWeight:700}}>合計</td><td></td>
            <td style={{color:"#0D9488",fontWeight:700}}>{num(tot.leads)}</td>
            <td>{num(tot.clicks)}</td><td>{num(tot.reach)}</td><td>{num(tot.imp)}</td>
            <td>—</td>
            <td style={{color:tot.cpa>5000?"#DC2626":"#15803D"}}>{yen(tot.cpa)}</td>
            <td>{tot.ctr.toFixed(1)}%</td>
            <td>{yen(tot.cpc)}</td><td>{yen(tot.cpm)}</td>
            <td style={{fontWeight:700}}>{yen(tot.spend)}</td>
          </tr>
          {data.map((r,i)=><tr key={i}>
            <td className="left" style={{color:"#6B7280"}}>{r.d}</td>
            <td style={{textAlign:"center",color:["土","日"].includes(r.w)?"#DC2626":"#6B7280"}}>{r.w}</td>
            <td style={{color:"#0D9488",fontWeight:500}}>{r.leads}</td>
            <td>{num(r.clicks)}</td><td>{num(r.reach)}</td><td>{num(r.imp)}</td>
            <td style={{color:"#9CA3AF"}}>{r.freq}</td>
            <td style={{color:r.cpa>5000?"#DC2626":"inherit"}}>{yen(r.cpa)}</td>
            <td>{r.ctr.toFixed(1)}%</td>
            <td>{yen(r.cpc)}</td><td>{yen(r.cpm)}</td>
            <td>{yen(r.spend)}</td>
          </tr>)}
        </tbody>
      </table>
    </div>
  </div>;
}
